<!DOCTYPE html>
<html>
<head>
  <title>For You 💖</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="confetti"></canvas>

<!-- floating hearts -->
<div class="hearts"></div>

<!-- bottom heart layer -->
<div class="heart-floor"></div>

<!-- chat bubble -->
<div class="bubble">Hmm… no 🙈</div>

<!-- STEP 1 -->
<div class="card box active" id="step1">
  <div class="emoji">💗</div>
  <h1 id="typing"></h1>
  <p>I have a tiny question</p>
  <button onclick="nextStep()">Start 💖</button>
</div>

<!-- STEP 2 -->
<div class="card box" id="step2">
  <h2>Are you ready? 😏</h2>
  <button onclick="nextStep2()">Yes</button>
  <button id="noBtn">No</button>
</div>

<!-- STEP 3 -->
<div class="card box" id="step3">
  <h2>Do you know what I’m most grateful for?</h2>
  <button id="otherBtn">Anything else</button>
  <button id="amanBtn" onclick="chooseAman()">Aman 💖</button>
</div>

<!-- STEP 4 -->
<div class="card box" id="step4">
  <h2 id="finalText"></h2>
</div>

<script src="script.js"></script>

</body>
</html>
