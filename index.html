<!DOCTYPE html>
<html>
<head>
  <title>For You 💖</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="confetti"></canvas>
<div class="hearts"></div>

<div class="card" id="step1">
  <h1 id="typing"></h1>
  <p>I have a tiny question</p>
  <button onclick="nextStep()">Start 💖</button>
</div>

<div class="card hidden" id="step2">
  <h2>Are you ready? 😏</h2>
  <button onclick="nextStep2()">Yes</button>
  <button id="noBtn">No</button>
</div>

<div class="card hidden" id="step3">
  <h2>Do you know what I’m most grateful for?</h2>
  <button onclick="wrongAnswer()">Life</button>
  <button onclick="rightAnswer()">Aman 💖</button>
</div>

<div class="card hidden" id="step4">
  <h2 id="finalText"></h2>
</div>

<script src="script.js"></script>

</body>
</html>
